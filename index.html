<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MATOTA Defterim - Pro Performance</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --a4-ratio: 1.414;
            --a4-width: 800px;
        }
        body {
            touch-action: none;
            background-color: #f1f5f9;
            font-family: 'Inter', sans-serif;
            overflow: hidden;
        }
        .a4-page-container {
            width: var(--a4-width);
            height: calc(var(--a4-width) * var(--a4-ratio));
            background: white;
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            margin: 30px auto;
            position: relative;
            user-select: none;
        }
        /* Performance Layering */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            outline: none;
        }
        .base-canvas { z-index: 2; } /* Kalıcı çizimler */
        .active-canvas { z-index: 3; cursor: crosshair; } /* Canlı çizim (Kasmayı önleyen katman) */
        
        .template-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: none;
            background-size: 100% 100%;
        }
        .hidden-view { display: none !important; }
        .tool-active {
            background-color: #2563eb !important;
            color: white !important;
        }
        .scroll-container {
            height: calc(100vh - 64px);
            overflow-y: auto;
            scroll-behavior: smooth;
            padding-bottom: 200px;
        }
        .modal-overlay {
            background: rgba(15, 23, 42, 0.6);
            backdrop-filter: blur(8px);
        }
    </style>
</head>
<body>

    <!-- 1. ANA SAYFA -->
    <div id="home-view" class="h-screen w-full flex flex-col">
        <header class="h-20 bg-white border-b flex items-center justify-between px-10 shadow-sm z-10">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2.5 rounded-2xl text-white">
                    <i data-lucide="book-marked" class="w-6 h-6"></i>
                </div>
                <h1 class="text-2xl font-black text-slate-800 tracking-tight">MATOTA <span class="text-blue-600">Defterim</span></h1>
            </div>
            <div class="flex items-center gap-4">
                <button onclick="loadNotebooks()" class="p-2.5 text-slate-400 hover:text-blue-600 transition"><i data-lucide="refresh-cw"></i></button>
                <button onclick="openCreateModal()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl flex items-center gap-2 hover:bg-blue-700 shadow-xl shadow-blue-100 font-bold transition-all">
                    <i data-lucide="plus"></i> Yeni Defter
                </button>
            </div>
        </header>
        <main class="flex-1 p-10 overflow-y-auto bg-slate-50/50">
            <div id="notebook-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-8"></div>
        </main>
    </div>

    <!-- 2. DEFTER EDİTÖRÜ -->
    <div id="editor-view" class="h-screen w-full flex flex-col hidden-view bg-slate-200">
        <header class="h-16 bg-white border-b flex items-center justify-between px-4 z-50 shadow-sm">
            <div class="flex items-center gap-3">
                <button onclick="showHome()" class="p-2 hover:bg-slate-100 rounded-full transition"><i data-lucide="arrow-left"></i></button>
                <h2 id="current-notebook-title" class="font-bold text-slate-800 border-l pl-4 truncate max-w-[150px]">Defter</h2>
            </div>

            <!-- Araç Paneli -->
            <div class="flex items-center gap-1 bg-slate-100 p-1 rounded-2xl border">
                <button onclick="setTool('ballpoint')" id="btn-ballpoint" class="p-2 rounded-xl tool-active" title="Kalem"><i data-lucide="pen-tool"></i></button>
                <button onclick="setTool('pencil')" id="btn-pencil" class="p-2 rounded-xl hover:bg-white" title="Kurşun Kalem"><i data-lucide="pencil"></i></button>
                <button onclick="setTool('highlighter')" id="btn-highlighter" class="p-2 rounded-xl hover:bg-white" title="Fosforlu"><i data-lucide="highlighter"></i></button>
                <button onclick="setTool('lasso')" id="btn-lasso" class="p-2 rounded-xl hover:bg-white" title="Halat (Taşıma)"><i data-lucide="lasso"></i></button>
                <button onclick="setTool('shape_rect')" id="btn-shape_rect" class="p-2 rounded-xl hover:bg-white" title="Dikdörtgen"><i data-lucide="square"></i></button>
                <button onclick="setTool('shape_circle')" id="btn-shape_circle" class="p-2 rounded-xl hover:bg-white" title="Daire"><i data-lucide="circle"></i></button>
                <div class="w-px h-6 bg-slate-300 mx-1"></div>
                <button onclick="setTool('eraser_stroke')" id="btn-eraser_stroke" class="p-2 rounded-xl hover:bg-white" title="Çizgi Silgisi"><i data-lucide="zap-off"></i></button>
            </div>

            <div class="flex items-center gap-2">
                <button onclick="addCoord()" class="p-2 text-blue-600 bg-blue-50 rounded-xl" title="Koordinat Sistemi"><i data-lucide="plus-square"></i></button>
                <button onclick="undo()" class="p-2 hover:bg-slate-100 rounded-xl"><i data-lucide="undo-2"></i></button>
                <button onclick="saveNotebookToSupabase()" id="save-btn" class="bg-blue-600 text-white px-5 py-2 rounded-xl flex items-center gap-2 font-bold shadow-lg shadow-blue-200">
                    <i data-lucide="cloud-upload" class="w-4 h-4"></i> Kaydet
                </button>
            </div>
        </header>

        <div class="scroll-container flex flex-col items-center py-6" id="editor-scroll">
            <div id="page-list" class="flex flex-col gap-6"></div>
            <button onclick="addNewPage()" class="my-10 bg-white text-slate-600 px-12 py-5 rounded-3xl shadow-xl border hover:text-blue-600 transition flex items-center gap-3 font-bold">
                <i data-lucide="plus-circle"></i> Yeni Sayfa Ekle
            </button>
        </div>

        <!-- Renk ve Kalınlık -->
        <div class="fixed bottom-8 left-1/2 -translate-x-1/2 bg-white/95 backdrop-blur-xl px-8 py-4 rounded-[2.5rem] shadow-2xl border flex items-center gap-8 z-50">
            <div class="flex gap-2.5">
                <button onclick="setColor('#0f172a')" class="w-9 h-9 rounded-full bg-slate-900 border-4 border-white shadow-md"></button>
                <button onclick="setColor('#2563eb')" class="w-9 h-9 rounded-full bg-blue-600 border-4 border-white shadow-md"></button>
                <button onclick="setColor('#dc2626')" class="w-9 h-9 rounded-full bg-red-600 border-4 border-white shadow-md"></button>
                <button onclick="setColor('#059669')" class="w-9 h-9 rounded-full bg-emerald-600 border-4 border-white shadow-md"></button>
            </div>
            <div class="flex items-center gap-4 border-l pl-8">
                <div class="flex flex-col"><span id="brush-label" class="text-sm font-black text-blue-600">3</span></div>
                <input type="range" min="1" max="40" value="3" oninput="updateBrushWidth(this.value)" class="w-40 accent-blue-600">
            </div>
        </div>
    </div>

    <!-- YENİ DEFTER MODALI -->
    <div id="create-modal" class="fixed inset-0 z-[100] modal-overlay flex items-center justify-center hidden-view">
        <div class="bg-white w-full max-w-xl rounded-[2.5rem] p-10 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <h3 class="text-3xl font-black text-slate-800">Yeni Defter</h3>
                <button onclick="closeCreateModal()" class="text-slate-400 hover:text-slate-600 p-2"><i data-lucide="x"></i></button>
            </div>
            <div class="space-y-8">
                <input type="text" id="nb-title-input" placeholder="Defter Başlığı..." class="w-full px-6 py-4 rounded-2xl border-2 bg-slate-50 outline-none focus:border-blue-500 text-xl font-medium transition">
                <div>
                    <label class="block text-xs font-black text-slate-400 uppercase mb-4 tracking-widest">Sayfa Şablonu Seçin</label>
                    <div class="grid grid-cols-2 gap-4 max-h-[350px] overflow-y-auto pr-2" id="template-options">
                        <button onclick="selectTemplate('blank', '', this)" class="template-btn border-4 border-blue-600 rounded-3xl p-5 text-left bg-blue-50">
                            <div class="w-full h-24 bg-white border rounded-xl mb-2 flex items-center justify-center"><i data-lucide="file" class="text-slate-200"></i></div>
                            <span class="font-bold text-blue-600">Düz Beyaz</span>
                        </button>
                    </div>
                </div>
                <button onclick="confirmCreate()" class="w-full bg-blue-600 text-white py-5 rounded-3xl font-black text-xl shadow-xl hover:bg-blue-700 transition-all">Defteri Oluştur</button>
            </div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://mpqncrkclcprjmaohpgm.supabase.co";
        const SUPABASE_KEY = "sb_publishable_0TPVUMiQ0_5zLkzhcEe4yQ_xsDSIaF4";
        const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        lucide.createIcons();

        let notebooks = [], activeNotebook = null;
        let selectedTemplate = { id: 'blank', url: '' };
        let currentTool = 'ballpoint', currentColor = '#0f172a', currentWidth = 3;
        let isDrawing = false, lastX, lastY, currentPath = [], templatesLoaded = false;
        let lassoSelectedPaths = [], lassoStartPos = null, isMoving = false;

        // --- DASHBOARD ---
        async function loadNotebooks() {
            const grid = document.getElementById('notebook-grid');
            grid.innerHTML = '<div class="col-span-full text-center py-10 text-slate-400 animate-pulse font-bold">Veriler Getiriliyor...</div>';
            try {
                const { data } = await supabaseClient.from('notebooks').select('*').order('updated_at', { ascending: false });
                notebooks = data || [];
                renderNotebookList();
            } catch (e) { renderNotebookList(); }
        }

        function renderNotebookList() {
            const grid = document.getElementById('notebook-grid');
            grid.innerHTML = '';
            notebooks.forEach(nb => {
                const card = document.createElement('div');
                card.className = "group bg-white rounded-[2rem] overflow-hidden shadow-sm border border-slate-100 hover:shadow-2xl transition-all cursor-pointer relative";
                card.onclick = () => showEditor(nb.id);
                card.innerHTML = `<div class="h-48 bg-slate-50 flex items-center justify-center"><i data-lucide="book" class="w-12 h-12 text-blue-100"></i></div>
                    <div class="p-6"><h3 class="font-black text-slate-800 text-lg mb-1 truncate">${nb.title}</h3><div class="text-[10px] font-bold text-slate-400"><span>${nb.pages.length} SAYFA</span></div></div>
                    <button onclick="event.stopPropagation(); deleteNotebook(${nb.id})" class="absolute top-4 right-4 p-2 bg-white/90 rounded-xl text-red-400 opacity-0 group-hover:opacity-100 hover:text-red-600 transition-all"><i data-lucide="trash-2" class="w-4 h-4"></i></button>`;
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // --- ŞABLONLAR ---
        async function fetchTemplates() {
            if (templatesLoaded) return;
            const container = document.getElementById('template-options');
            try {
                const { data } = await supabaseClient.storage.from('fields').list();
                if (data) {
                    data.forEach(file => {
                        if (file.name.startsWith('.') || file.name.includes('placeholder')) return;
                        const { data: { publicUrl } } = supabaseClient.storage.from('fields').getPublicUrl(file.name);
                        const btn = document.createElement('button');
                        btn.className = "template-btn border-4 border-transparent rounded-3xl p-5 text-left bg-slate-50 transition hover:border-slate-200";
                        btn.onclick = () => selectTemplate(file.id, publicUrl, btn);
                        btn.innerHTML = `<div class="w-full h-24 border rounded-xl mb-2 bg-cover bg-center" style="background-image: url('${publicUrl}')"></div>
                            <span class="font-bold text-slate-700 text-xs truncate block">${file.name.split('.')[0]}</span>`;
                        container.appendChild(btn);
                    });
                    templatesLoaded = true;
                }
            } catch (err) { console.error(err); }
        }

        // --- MODAL ---
        function openCreateModal() { 
            document.getElementById('create-modal').classList.remove('hidden-view'); 
            fetchTemplates(); 
        }
        function closeCreateModal() { document.getElementById('create-modal').classList.add('hidden-view'); }
        function selectTemplate(id, url, el) {
            selectedTemplate = { id, url };
            document.querySelectorAll('.template-btn').forEach(b => b.className = "template-btn border-4 border-transparent rounded-3xl p-5 text-left bg-slate-50 transition hover:border-slate-200");
            el.className = "template-btn border-4 border-blue-600 rounded-3xl p-5 text-left bg-blue-50";
        }

        async function confirmCreate() {
            const title = document.getElementById('nb-title-input').value.trim() || "Yeni Defter";
            const newNb = { id: Date.now(), title, pages: [{ paths: [], template: selectedTemplate.url }], updated_at: new Date().toISOString() };
            notebooks.unshift(newNb);
            closeCreateModal();
            showEditor(newNb.id);
            await supabaseClient.from('notebooks').insert([newNb]);
        }

        // --- EDİTÖR ---
        function showHome() { document.getElementById('home-view').classList.remove('hidden-view'); document.getElementById('editor-view').classList.add('hidden-view'); loadNotebooks(); }
        function showEditor(id) {
            activeNotebook = notebooks.find(n => n.id === id);
            document.getElementById('home-view').classList.add('hidden-view');
            document.getElementById('editor-view').classList.remove('hidden-view');
            document.getElementById('current-notebook-title').innerText = activeNotebook.title;
            renderPages();
        }

        function renderPages() {
            const list = document.getElementById('page-list');
            list.innerHTML = '';
            activeNotebook.pages.forEach((page, idx) => {
                const container = document.createElement('div');
                container.className = 'a4-page-container';
                
                const template = document.createElement('div');
                template.className = 'template-layer';
                if (page.template) template.style.backgroundImage = `url('${page.template}')`;
                
                const baseCanvas = document.createElement('canvas');
                baseCanvas.width = 800; baseCanvas.height = 1131;
                baseCanvas.className = 'base-canvas';
                
                const activeCanvas = document.createElement('canvas');
                activeCanvas.width = 800; activeCanvas.height = 1131;
                activeCanvas.className = 'active-canvas';
                activeCanvas.dataset.index = idx;
                
                activeCanvas.addEventListener('pointerdown', startAction);
                activeCanvas.addEventListener('pointermove', doAction);
                activeCanvas.addEventListener('pointerup', endAction);
                
                container.append(template, baseCanvas, activeCanvas);
                list.appendChild(container);
                drawContent(baseCanvas, page.paths);
            });
        }

        function addNewPage() {
            const last = activeNotebook.pages[activeNotebook.pages.length-1]?.template || '';
            activeNotebook.pages.push({ paths: [], template: last });
            renderPages();
        }

        // --- PERFORMANSLI ÇİZİM SİSTEMİ ---
        function startAction(e) {
            if (e.pointerType === 'touch' && e.buttons !== 1) return;
            isDrawing = true;
            activeCanvas = e.target;
            const idx = activeCanvas.dataset.index;
            const pos = getPos(e);
            lastX = pos.x; lastY = pos.y;
            currentPath = [{ x: pos.x, y: pos.y }];
            
            activeCtx = activeCanvas.getContext('2d');
            activeCtx.lineCap = 'round'; activeCtx.lineJoin = 'round';

            if (currentTool === 'lasso') {
                lassoStartPos = pos;
                // Eğer daha önce seçilmiş bir şey varsa ve içine tıklandıysa taşımaya geç
                const hit = lassoSelectedPaths.length > 0;
                if (hit) isMoving = true;
                else {
                    lassoSelectedPaths = [];
                    activeCtx.clearRect(0,0,800,1131);
                }
            } else if (currentTool === 'eraser_stroke') {
                strokeErase(pos.x, pos.y, idx);
                isDrawing = false;
            }
        }

        function doAction(e) {
            if (!isDrawing) return;
            const pos = getPos(e);
            const idx = activeCanvas.dataset.index;

            if (currentTool === 'lasso') {
                if (isMoving) {
                    const dx = pos.x - lastX;
                    const dy = pos.y - lastY;
                    lassoSelectedPaths.forEach(p => {
                        if (p.points) p.points.forEach(pt => { pt.x += dx; pt.y += dy; });
                        if (p.x !== undefined) { p.x += dx; p.y += dy; }
                    });
                    const baseCnv = activeCanvas.parentElement.querySelector('.base-canvas');
                    drawContent(baseCnv, activeNotebook.pages[idx].paths);
                    drawSelectionOverlay();
                } else {
                    activeCtx.clearRect(0,0,800,1131);
                    activeCtx.setLineDash([5, 5]);
                    activeCtx.strokeStyle = '#3b82f6';
                    activeCtx.strokeRect(lassoStartPos.x, lassoStartPos.y, pos.x - lassoStartPos.x, pos.y - lassoStartPos.y);
                    activeCtx.setLineDash([]);
                }
            } else if (currentTool.startsWith('shape_')) {
                activeCtx.clearRect(0,0,800,1131);
                drawShapePreview(activeCtx, lassoStartPos || {x:lastX,y:lastY}, pos);
            } else {
                // Kalem çizimi: Sadece aktif katmana çiz, kasmasın.
                activeCtx.strokeStyle = currentColor;
                activeCtx.lineWidth = currentWidth;
                activeCtx.globalAlpha = currentTool === 'highlighter' ? 0.3 : (currentTool === 'pencil' ? 0.5 : 1);
                activeCtx.beginPath();
                activeCtx.moveTo(lastX, lastY);
                activeCtx.lineTo(pos.x, pos.y);
                activeCtx.stroke();
                currentPath.push({ x: pos.x, y: pos.y });
            }
            lastX = pos.x; lastY = pos.y;
        }

        function endAction(e) {
            if (!isDrawing) return;
            const idx = activeCanvas.dataset.index;
            const pos = getPos(e);

            if (currentTool === 'lasso' && !isMoving) {
                const rect = { x1: Math.min(lassoStartPos.x, pos.x), y1: Math.min(lassoStartPos.y, pos.y), x2: Math.max(lassoStartPos.x, pos.x), y2: Math.max(lassoStartPos.y, pos.y) };
                lassoSelectedPaths = activeNotebook.pages[idx].paths.filter(p => {
                    if (p.points) return p.points.some(pt => pt.x > rect.x1 && pt.x < rect.x2 && pt.y > rect.y1 && pt.y < rect.y2);
                    return p.x > rect.x1 && p.x < rect.x2 && p.y > rect.y1 && p.y < rect.y2;
                });
                drawSelectionOverlay();
            } else if (currentTool.startsWith('shape_')) {
                const type = currentTool.split('_')[1];
                activeNotebook.pages[idx].paths.push({ type, x: lassoStartPos.x, y: lassoStartPos.y, w: pos.x - lassoStartPos.x, h: pos.y - lassoStartPos.y, color: currentColor, width: currentWidth });
                finalizePage(idx);
            } else if (!currentTool.includes('lasso') && currentPath.length > 1) {
                activeNotebook.pages[idx].paths.push({ tool: currentTool, color: currentColor, width: currentWidth, points: [...currentPath] });
                finalizePage(idx);
            }
            
            isDrawing = false; isMoving = false;
        }

        function finalizePage(idx) {
            const baseCnv = document.querySelectorAll('.base-canvas')[idx];
            const actCnv = document.querySelectorAll('.active-canvas')[idx];
            drawContent(baseCnv, activeNotebook.pages[idx].paths);
            actCnv.getContext('2d').clearRect(0,0,800,1131);
        }

        function drawShapePreview(ctx, start, end) {
            ctx.strokeStyle = currentColor; ctx.lineWidth = currentWidth;
            if (currentTool === 'shape_rect') ctx.strokeRect(start.x, start.y, end.x - start.x, end.y - start.y);
            else if (currentTool === 'shape_circle') {
                ctx.beginPath();
                const r = Math.hypot(end.x - start.x, end.y - start.y);
                ctx.arc(start.x, start.y, r, 0, Math.PI * 2);
                ctx.stroke();
            }
        }

        function drawSelectionOverlay() {
            activeCtx.clearRect(0,0,800,1131);
            if (lassoSelectedPaths.length === 0) return;
            activeCtx.strokeStyle = '#3b82f6'; activeCtx.lineWidth = 2;
            activeCtx.setLineDash([5, 5]);
            activeCtx.strokeRect(lastX-10, lastY-10, 20, 20); // Dummy indicator
            activeCtx.setLineDash([]);
        }

        function drawContent(canvas, paths) {
            const ctx = canvas.getContext('2d');
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            paths.forEach(p => {
                ctx.beginPath();
                ctx.strokeStyle = p.color || currentColor;
                ctx.lineWidth = p.width || 2;
                if (p.type === 'rect') ctx.strokeRect(p.x, p.y, p.w, p.h);
                else if (p.type === 'circle') { ctx.beginPath(); ctx.arc(p.x, p.y, Math.hypot(p.w, p.h), 0, Math.PI*2); ctx.stroke(); }
                else if (p.type === 'coord') drawCoord(ctx, p.x, p.y);
                else {
                    ctx.globalAlpha = p.tool === 'highlighter' ? 0.3 : (p.tool === 'pencil' ? 0.5 : 1);
                    if (p.points?.length > 0) {
                        ctx.moveTo(p.points[0].x, p.points[0].y);
                        p.points.forEach(pt => ctx.lineTo(pt.x, pt.y));
                        ctx.stroke();
                    }
                }
                ctx.globalAlpha = 1;
            });
        }

        // --- YARDIMCI ---
        function getPos(e) { const r = e.target.getBoundingClientRect(); return { x: (e.clientX - r.left) * (800 / r.width), y: (e.clientY - r.top) * (1131 / r.height) }; }
        function setTool(t) { currentTool = t; document.querySelectorAll('[id^="btn-"]').forEach(b => b.classList.remove('tool-active')); document.getElementById('btn-' + t).classList.add('tool-active'); }
        function setColor(c) { currentColor = c; }
        function updateBrushWidth(w) { currentWidth = w; document.getElementById('brush-label').innerText = w; }
        
        function strokeErase(x, y, idx) {
            activeNotebook.pages[idx].paths = activeNotebook.pages[idx].paths.filter(p => {
                if (!p.points) return Math.hypot(p.x - x, p.y - y) > 30;
                return !p.points.some(pt => Math.hypot(pt.x - x, pt.y - y) < 20);
            });
            finalizePage(idx);
        }

        function addCoord() {
            const idx = activeNotebook.pages.length - 1;
            activeNotebook.pages[idx].paths.push({ type: 'coord', x: 400, y: 550, color: '#94a3b8', width: 2 });
            finalizePage(idx);
        }

        function drawCoord(ctx, x, y) {
            ctx.moveTo(x-180, y); ctx.lineTo(x+180, y);
            ctx.moveTo(x, y-180); ctx.lineTo(x, y+180);
            ctx.stroke();
            ctx.font = 'bold 14px Inter'; ctx.fillText('x', x+170, y-10); ctx.fillText('y', x+10, y-170);
        }

        function undo() {
            const idx = activeNotebook.pages.length - 1;
            activeNotebook.pages[idx].paths.pop();
            finalizePage(idx);
        }

        async function saveNotebookToSupabase() {
            const btn = document.getElementById('save-btn');
            btn.innerText = "Kaydediliyor...";
            activeNotebook.updated_at = new Date().toISOString();
            await supabaseClient.from('notebooks').upsert(activeNotebook);
            btn.innerHTML = '<i data-lucide="cloud-upload"></i> Kaydet';
            lucide.createIcons();
            showMessage("Başarıyla kaydedildi!");
        }

        function showMessage(t) {
            const msg = document.createElement('div');
            msg.className = "fixed top-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-2 rounded-full z-[100] animate-bounce";
            msg.innerText = t; document.body.appendChild(msg); setTimeout(() => msg.remove(), 2000);
        }

        loadNotebooks();
    </script>
</body>
</html>
